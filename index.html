<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>集団面接リアルタイム評価器</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="面接評価">
<meta name="format-detection" content="telephone=no">
<meta name="theme-color" content="#0d0f14">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='32' fill='%230d0f14'/%3E%3Ctext x='90' y='118' font-size='90' text-anchor='middle' fill='%23ffd84d'%3E★%3C/text%3E%3C/svg%3E">

<style>
:root{
  --bg:#0d0f14;
  --bg2:#151823;
  --bg3:#1d2130;
  --line:#2a2f42;
  --text:#e8ecf4;
  --sub:#8a91a6;
  --accent:#ffd84d;
  --accent2:#ffbf00;
  --danger:#ff5d6c;
  --ok:#4ade80;
  --blue:#5aa9ff;
  --yellow:#ffd84d;
  --gray:#6b7280;
  --safe-t:env(safe-area-inset-top);
  --safe-b:env(safe-area-inset-bottom);
  --safe-l:env(safe-area-inset-left);
  --safe-r:env(safe-area-inset-right);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;touch-action:manipulation;}
html,body{height:100dvh;width:100vw;overflow:hidden;overscroll-behavior:none;position:fixed;inset:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:14px;
  user-select:none;
  -webkit-user-select:none;
  padding:var(--safe-t) var(--safe-r) var(--safe-b) var(--safe-l);
  letter-spacing:.02em;
}
button{
  font-family:inherit;color:inherit;background:none;border:none;cursor:pointer;
  font-size:inherit;
}
input{
  font-family:inherit;color:inherit;background:var(--bg3);border:1px solid var(--line);
  border-radius:8px;padding:8px 12px;font-size:15px;outline:none;
}
input:focus{border-color:var(--accent);}

.screen{position:fixed;inset:0;height:100dvh;padding:var(--safe-t) var(--safe-r) var(--safe-b) var(--safe-l);display:none;flex-direction:column;}
.screen.active{display:flex;}

/* ========== SETUP SCREEN ========== */
#setup{padding:16px 24px;justify-content:center;align-items:center;overflow-y:auto;}
.setup-wrap{width:100%;max-width:780px;}
.title{font-size:22px;font-weight:700;letter-spacing:.08em;margin-bottom:4px;}
.title .acc{color:var(--accent);}
.subtitle{color:var(--sub);font-size:12px;margin-bottom:18px;}
.section-label{font-size:11px;color:var(--sub);letter-spacing:.15em;margin-bottom:8px;text-transform:uppercase;}
.count-row{display:flex;gap:8px;margin-bottom:18px;}
.count-btn{
  flex:1;padding:14px 0;background:var(--bg2);border:1px solid var(--line);
  border-radius:10px;font-weight:600;font-size:18px;transition:.15s;
}
.count-btn.on{background:var(--accent);color:#1a1300;border-color:var(--accent);}
.names-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;}
.name-field{display:flex;flex-direction:column;gap:4px;}
.name-field label{font-size:10px;color:var(--sub);padding-left:4px;}
.start-btn{
  width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#1a1300;font-weight:700;font-size:17px;border-radius:12px;
  letter-spacing:.1em;box-shadow:0 4px 20px rgba(255,216,77,.25);
}
.start-btn:active{transform:scale(.98);}

/* ========== INTERVIEW SCREEN ========== */
#interview{display:none;flex-direction:column;}
#interview.active{display:flex;}
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;background:var(--bg2);border-bottom:1px solid var(--line);
  flex-shrink:0;
}
.timer-box{display:flex;align-items:center;gap:10px;}
.timer{
  font-family:"SF Mono",Menlo,monospace;font-size:22px;font-weight:600;
  color:var(--accent);letter-spacing:.05em;
}
.timer-label{font-size:10px;color:var(--sub);letter-spacing:.15em;}
.end-btn{
  background:var(--danger);color:#fff;padding:8px 16px;border-radius:8px;
  font-weight:600;font-size:13px;
}
.end-btn:active{opacity:.8;}

.grid{
  flex:1;display:grid;gap:6px;padding:6px;overflow:hidden;
}
.grid.n1{grid-template-columns:1fr;}
.grid.n2{grid-template-columns:repeat(2,1fr);}
.grid.n3{grid-template-columns:repeat(3,1fr);}
.grid.n4{grid-template-columns:repeat(4,1fr);}
.grid.n5{grid-template-columns:repeat(5,1fr);}
.grid.n6{grid-template-columns:repeat(6,1fr);}

.card{
  background:var(--bg2);border:2px solid var(--line);border-radius:10px;
  display:flex;flex-direction:column;overflow:hidden;transition:.2s;min-width:0;
}
.card.dimmed{opacity:.45;}
.card.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 0 18px rgba(255,216,77,.3);opacity:1;}

.card-head{
  padding:6px 10px;background:var(--bg3);border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;flex-shrink:0;
}
.card.active .card-head{background:rgba(255,216,77,.15);}
.name{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.active-dot{
  width:8px;height:8px;border-radius:50%;background:var(--line);flex-shrink:0;
}
.card.active .active-dot{background:var(--accent);box-shadow:0 0 8px var(--accent);}

.card-body{flex:1;padding:6px 8px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;}

.stars-block{display:flex;flex-direction:column;gap:3px;}
.star-row{display:flex;align-items:center;justify-content:space-between;gap:4px;}
.star-label{font-size:9px;color:var(--sub);flex-shrink:0;letter-spacing:.05em;}
.stars{display:flex;gap:2px;}
.star{
  font-size:16px;color:var(--line);transition:.1s;line-height:1;
  padding:2px;
}
.star.on{color:var(--accent);text-shadow:0 0 6px rgba(255,216,77,.5);}
.star:active{transform:scale(1.2);}

.chips-block{display:flex;flex-direction:column;gap:3px;}
.chip-row{display:flex;flex-wrap:wrap;gap:3px;}
.chip{
  font-size:9.5px;padding:4px 6px;border-radius:6px;font-weight:600;
  border:1px solid transparent;line-height:1.2;white-space:nowrap;
  position:relative;transition:transform .08s, box-shadow .08s, background .15s;
}
.chip:active{transform:scale(.92);}
.chip.flash{
  animation:chipFlash .45s ease-out;
}
@keyframes chipFlash{
  0%{transform:scale(1);}
  20%{transform:scale(1.18);box-shadow:0 0 0 3px rgba(255,255,255,.35), 0 0 16px currentColor;filter:brightness(1.8);}
  100%{transform:scale(1);box-shadow:none;filter:brightness(1);}
}
.chip.gray{background:rgba(107,114,128,.2);color:#cbd0db;border-color:rgba(107,114,128,.4);}
.chip.yellow{background:rgba(255,216,77,.15);color:var(--yellow);border-color:rgba(255,216,77,.35);}
.chip.blue{background:rgba(90,169,255,.15);color:var(--blue);border-color:rgba(90,169,255,.35);}

/* Floating timestamp feedback */
.float-ts{
  position:absolute;left:50%;top:0;transform:translate(-50%,0);
  background:#fff;color:#1a1300;font-weight:800;font-size:11px;
  padding:3px 8px;border-radius:10px;pointer-events:none;
  white-space:nowrap;z-index:10;
  animation:floatUp .9s ease-out forwards;
  box-shadow:0 4px 12px rgba(0,0,0,.4);
}
@keyframes floatUp{
  0%{opacity:0;transform:translate(-50%,0) scale(.6);}
  20%{opacity:1;transform:translate(-50%,-18px) scale(1.05);}
  100%{opacity:0;transform:translate(-50%,-38px) scale(.9);}
}

/* Latest log highlight */
.log-mini div.fresh{
  color:var(--text);background:rgba(255,216,77,.18);border-radius:4px;padding:2px 4px;
  animation:freshFade 1.2s ease-out forwards;
}
@keyframes freshFade{
  0%{background:rgba(255,216,77,.35);}
  100%{background:rgba(255,216,77,0);color:var(--sub);}
}

.log-mini{
  font-size:9px;color:var(--sub);max-height:50px;overflow-y:auto;
  border-top:1px solid var(--line);padding-top:4px;line-height:1.4;
}
.log-mini div{padding:1px 0;}
.log-mini .ts{color:var(--accent);font-family:"SF Mono",monospace;margin-right:4px;}

/* ========== RESULT SCREEN ========== */
#result{padding:0;}
.result-top{
  padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0;
}
.result-title{font-size:16px;font-weight:700;letter-spacing:.05em;}
.result-actions{display:flex;gap:8px;}
.btn{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;}
.btn-primary{background:var(--accent);color:#1a1300;}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--line);}
.btn:active{opacity:.7;}

.result-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:12px;}
.result-card{
  background:var(--bg2);border:1px solid var(--line);border-radius:10px;
  padding:12px 14px;
}
.rc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px;}
.rc-name{font-size:16px;font-weight:700;color:var(--accent);}
.rc-stars{display:flex;gap:14px;flex-wrap:wrap;}
.rc-stars span{font-size:11px;color:var(--sub);}
.rc-stars b{color:var(--text);font-size:13px;margin-left:4px;}
.rc-log{display:flex;flex-direction:column;gap:3px;border-top:1px solid var(--line);padding-top:8px;margin-top:4px;}
.rc-log-empty{color:var(--sub);font-size:11px;font-style:italic;}
.rc-log-item{display:flex;gap:8px;font-size:12px;line-height:1.5;}
.rc-log-item .t{color:var(--accent);font-family:"SF Mono",monospace;flex-shrink:0;font-size:11px;}

.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:rgba(74,222,128,.95);color:#063;padding:10px 20px;border-radius:20px;
  font-weight:700;font-size:13px;opacity:0;transition:.3s;pointer-events:none;z-index:100;
}
.toast.show{opacity:1;}

/* scrollbar */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px;}

/* Add to Home Screen banner */
.a2hs{
  position:fixed;top:0;left:0;right:0;z-index:150;
  background:linear-gradient(135deg,#1d2130,#2a2f42);
  border-bottom:1px solid var(--accent);
  padding:8px 14px;display:flex;align-items:center;gap:10px;
  font-size:11px;line-height:1.4;
  transform:translateY(-100%);transition:transform .35s;
}
.a2hs.show{transform:translateY(0);}
.a2hs .icon{font-size:20px;}
.a2hs .msg{flex:1;color:var(--text);}
.a2hs .msg b{color:var(--accent);}
.a2hs .close{
  background:var(--bg3);border:1px solid var(--line);
  padding:6px 12px;border-radius:6px;font-size:11px;font-weight:600;color:var(--sub);
}

/* portrait warning */
.rotate-hint{
  display:none;position:fixed;inset:0;background:var(--bg);z-index:200;
  flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;
}
.rotate-hint .ic{font-size:60px;margin-bottom:16px;animation:rot 2s ease-in-out infinite;}
.rotate-hint p{color:var(--sub);font-size:14px;line-height:1.6;}
@keyframes rot{0%,100%{transform:rotate(0)}50%{transform:rotate(90deg)}}
@media (orientation:portrait) and (max-width:900px){
  .rotate-hint{display:flex;}
}
</style>
</head>
<body>

<!-- 1. SETUP -->
<div class="screen active" id="setup">
  <div class="setup-wrap">
    <div class="title">集団面接 <span class="acc">★</span> リアルタイム評価器</div>
    <div class="subtitle">受験者の人数と名前を設定して、面接を開始してください</div>

    <div class="section-label">同時面接人数</div>
    <div class="count-row" id="countRow">
      <button class="count-btn" data-n="1">1</button>
      <button class="count-btn" data-n="2">2</button>
      <button class="count-btn on" data-n="3">3</button>
      <button class="count-btn" data-n="4">4</button>
      <button class="count-btn" data-n="5">5</button>
      <button class="count-btn" data-n="6">6</button>
    </div>

    <div class="section-label">受験者 名前 / 出席番号</div>
    <div class="names-grid" id="namesGrid"></div>

    <button class="start-btn" id="startBtn">面接開始 ▶</button>
  </div>
</div>

<!-- 2. INTERVIEW -->
<div class="screen" id="interview">
  <div class="top-bar">
    <div class="timer-box">
      <div>
        <div class="timer-label">ELAPSED</div>
        <div class="timer" id="timer">00:00</div>
      </div>
    </div>
    <button class="end-btn" id="endBtn">■ 面接終了</button>
  </div>
  <div class="grid" id="grid"></div>
</div>

<!-- 3. RESULT -->
<div class="screen" id="result">
  <div class="result-top">
    <div class="result-title">📋 面接記録 <span style="color:var(--sub);font-size:12px;font-weight:400;" id="resultTime"></span></div>
    <div class="result-actions">
      <button class="btn btn-secondary" id="backBtn">↩ 戻る</button>
      <button class="btn btn-primary" id="copyBtn">📋 クリップボードにコピー</button>
      <button class="btn btn-secondary" id="newBtn">＋ 新規</button>
    </div>
  </div>
  <div class="result-body" id="resultBody"></div>
</div>

<div class="toast" id="toast">コピーしました</div>

<div class="a2hs" id="a2hs">
  <div class="icon">📲</div>
  <div class="msg">アドレスバーを消すには <b>共有 ▸ ホーム画面に追加</b> でフルスクリーン起動できます</div>
  <button class="close" id="a2hsClose">閉じる</button>
</div>

<div class="rotate-hint">
  <div class="ic">📱</div>
  <p>端末を<b style="color:var(--accent)">横向き</b>にしてご利用ください<br><span style="font-size:11px;">Please rotate your device to landscape</span></p>
</div>

<script>
'use strict';

/* ===== Anti double-tap zoom ===== */
let lastTap=0;
document.addEventListener('touchend',function(e){
  const now=Date.now();
  if(now-lastTap<350){e.preventDefault();}
  lastTap=now;
},{passive:false});
document.addEventListener('gesturestart',e=>e.preventDefault());

/* ===== Vibration ===== */
function buzz(pattern){
  try{
    if(!navigator.vibrate)return;
    navigator.vibrate(pattern==null?15:pattern);
  }catch(e){}
}

/* ===== State ===== */
const LS_KEY='interview_eval_v1';
let state={
  count:3,
  names:['','','','','',''],
  startTs:0,
  activeIdx:-1,
  participants:[], // {name, stars:{manner,voice,content}, logs:[{t,text,cat}]}
  phase:'setup'
};

function saveLS(){
  try{localStorage.setItem(LS_KEY,JSON.stringify(state));}catch(e){}
}
function loadLS(){
  try{
    const s=localStorage.getItem(LS_KEY);
    if(s){
      const p=JSON.parse(s);
      if(p&&p.count){
        state.count=p.count;
        state.names=p.names||state.names;
      }
    }
  }catch(e){}
}

/* ===== Setup screen ===== */
function renderNames(){
  const g=document.getElementById('namesGrid');
  g.innerHTML='';
  for(let i=0;i<state.count;i++){
    const wrap=document.createElement('div');
    wrap.className='name-field';
    wrap.innerHTML=`<label>受験者 ${i+1}</label><input type="text" data-i="${i}" value="${(state.names[i]||'').replace(/"/g,'&quot;')}" placeholder="名前 / 番号">`;
    g.appendChild(wrap);
  }
  g.querySelectorAll('input').forEach(inp=>{
    inp.addEventListener('input',e=>{
      state.names[+e.target.dataset.i]=e.target.value;
      saveLS();
    });
  });
}
document.getElementById('countRow').addEventListener('click',e=>{
  const b=e.target.closest('.count-btn');
  if(!b)return;
  buzz();
  document.querySelectorAll('.count-btn').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  state.count=+b.dataset.n;
  renderNames();
  saveLS();
});

/* ===== Interview start ===== */
document.getElementById('startBtn').addEventListener('click',()=>{
  buzz(25);
  // Try fullscreen (iOS 16.4+ / other browsers) — only effective in Safari from user gesture
  tryFullscreen();
  // Old trick: scroll to hide URL bar in standard Safari
  setTimeout(()=>window.scrollTo(0,1),100);
  state.participants=[];
  for(let i=0;i<state.count;i++){
    state.participants.push({
      name:state.names[i]||`受験者${i+1}`,
      stars:{manner:0,voice:0,content:0},
      logs:[]
    });
  }
  state.startTs=Date.now();
  state.activeIdx=-1;
  state.phase='interview';
  go('interview');
  renderGrid();
  startTimer();
});

function tryFullscreen(){
  try{
    const el=document.documentElement;
    const req=el.requestFullscreen||el.webkitRequestFullscreen||el.webkitRequestFullScreen;
    if(req)req.call(el).catch(()=>{});
  }catch(e){}
}

/* ===== Timer ===== */
let timerId=null;
function fmtTime(s){
  const m=Math.floor(s/60), x=s%60;
  return String(m).padStart(2,'0')+':'+String(x).padStart(2,'0');
}
function elapsedSec(){return Math.floor((Date.now()-state.startTs)/1000);}
function startTimer(){
  clearInterval(timerId);
  const tick=()=>{document.getElementById('timer').textContent=fmtTime(elapsedSec());};
  tick();
  timerId=setInterval(tick,500);
}
function stopTimer(){clearInterval(timerId);}

/* ===== Chips definition ===== */
const CHIPS={
  manner:{cls:'gray',label:'マナー',items:['入退室◎','入退室×','目線キョロ','他者傾聴◎','姿勢崩れ']},
  voice:{cls:'yellow',label:'話し方',items:['最初元気◎','早口注意','語尾消滅','えー・あの']},
  content:{cls:'blue',label:'内容',items:['結論ファースト','具体例◎','テンプレ感','質問ズレ','時間オーバー']}
};
const STAR_LABELS={manner:'マナー',voice:'話し方',content:'内容'};

/* ===== Grid ===== */
function renderGrid(){
  const g=document.getElementById('grid');
  g.className='grid n'+state.count;
  g.innerHTML='';
  state.participants.forEach((p,i)=>{
    const card=document.createElement('div');
    card.className='card';
    card.dataset.i=i;
    card.innerHTML=`
      <div class="card-head" data-act="${i}">
        <div class="name">${escapeHtml(p.name)}</div>
        <div class="active-dot"></div>
      </div>
      <div class="card-body">
        <div class="stars-block">
          ${renderStarRow(i,'manner')}
          ${renderStarRow(i,'voice')}
          ${renderStarRow(i,'content')}
        </div>
        <div class="chips-block">
          ${renderChipRow(i,'manner')}
          ${renderChipRow(i,'voice')}
          ${renderChipRow(i,'content')}
        </div>
        <div class="log-mini" id="log-${i}"></div>
      </div>
    `;
    g.appendChild(card);
  });
  bindGridEvents();
  updateActive();
  state.participants.forEach((_,i)=>renderMiniLog(i));
}
function renderStarRow(i,key){
  const p=state.participants[i];
  const v=p.stars[key];
  let s='';
  for(let k=1;k<=5;k++){
    s+=`<span class="star ${k<=v?'on':''}" data-star="${key}" data-i="${i}" data-v="${k}">★</span>`;
  }
  return `<div class="star-row"><span class="star-label">${STAR_LABELS[key]}</span><div class="stars">${s}</div></div>`;
}
function renderChipRow(i,key){
  const c=CHIPS[key];
  return `<div class="chip-row">${c.items.map(t=>`<button class="chip ${c.cls}" data-chip data-i="${i}" data-cat="${key}" data-t="${escapeAttr(t)}">${t}</button>`).join('')}</div>`;
}
function bindGridEvents(){
  document.querySelectorAll('.card-head').forEach(h=>{
    h.addEventListener('click',e=>{
      const i=+h.dataset.act;
      buzz(20);
      state.activeIdx = (state.activeIdx===i) ? -1 : i;
      updateActive();
    });
  });
  document.querySelectorAll('.star').forEach(s=>{
    s.addEventListener('click',e=>{
      e.stopPropagation();
      const i=+s.dataset.i, key=s.dataset.star, v=+s.dataset.v;
      const cur=state.participants[i].stars[key];
      state.participants[i].stars[key] = (cur===v ? v-1 : v);
      buzz(10);
      // re-render just the star row
      const row=s.closest('.star-row');
      row.outerHTML = renderStarRow(i,key);
      // rebind
      document.querySelectorAll(`.star[data-i="${i}"][data-star="${key}"]`).forEach(st=>{
        st.addEventListener('click',ev=>{
          ev.stopPropagation();
          const ii=+st.dataset.i,kk=st.dataset.star,vv=+st.dataset.v;
          const c=state.participants[ii].stars[kk];
          state.participants[ii].stars[kk]=(c===vv?vv-1:vv);
          buzz(10);
          const r=st.closest('.star-row');
          r.outerHTML=renderStarRow(ii,kk);
          rebindStars(ii,kk);
          saveLS();
        });
      });
      saveLS();
    });
  });
  document.querySelectorAll('[data-chip]').forEach(c=>{
    c.addEventListener('click',e=>{
      e.stopPropagation();
      const i=+c.dataset.i, cat=c.dataset.cat, t=c.dataset.t;
      const ts=fmtTime(elapsedSec());
      state.participants[i].logs.push({t:ts,text:t,cat});
      // Strong haptic pattern (tap-tap)
      buzz([18,40,12]);
      // Visual flash on chip
      c.classList.remove('flash');
      void c.offsetWidth; // reflow to restart animation
      c.classList.add('flash');
      // Floating timestamp above the chip
      const ft=document.createElement('div');
      ft.className='float-ts';
      ft.textContent='+ ['+ts+']';
      c.appendChild(ft);
      setTimeout(()=>ft.remove(),950);
      // Re-render mini log with fresh highlight on newest
      renderMiniLog(i,true);
      saveLS();
    });
  });
}
function rebindStars(i,key){
  document.querySelectorAll(`.star[data-i="${i}"][data-star="${key}"]`).forEach(st=>{
    st.addEventListener('click',ev=>{
      ev.stopPropagation();
      const ii=+st.dataset.i,kk=st.dataset.star,vv=+st.dataset.v;
      const c=state.participants[ii].stars[kk];
      state.participants[ii].stars[kk]=(c===vv?vv-1:vv);
      buzz(10);
      const r=st.closest('.star-row');
      r.outerHTML=renderStarRow(ii,kk);
      rebindStars(ii,kk);
      saveLS();
    });
  });
}
function renderMiniLog(i,markFresh){
  const el=document.getElementById('log-'+i);
  if(!el)return;
  const logs=state.participants[i].logs.slice(-20).reverse();
  el.innerHTML=logs.map((l,idx)=>`<div class="${markFresh&&idx===0?'fresh':''}"><span class="ts">[${l.t}]</span>${escapeHtml(l.text)}</div>`).join('');
}
function updateActive(){
  document.querySelectorAll('.card').forEach(c=>{
    const i=+c.dataset.i;
    c.classList.remove('active','dimmed');
    if(state.activeIdx===-1){/* none */}
    else if(state.activeIdx===i)c.classList.add('active');
    else c.classList.add('dimmed');
  });
}

/* ===== End interview ===== */
document.getElementById('endBtn').addEventListener('click',()=>{
  buzz(30);
  stopTimer();
  state.phase='result';
  renderResult();
  go('result');
});

/* ===== Result screen ===== */
function renderResult(){
  document.getElementById('resultTime').textContent='総時間 '+fmtTime(elapsedSec());
  const body=document.getElementById('resultBody');
  body.innerHTML='';
  state.participants.forEach(p=>{
    const card=document.createElement('div');
    card.className='result-card';
    const starHtml=Object.keys(STAR_LABELS).map(k=>{
      const v=p.stars[k];
      const filled='★'.repeat(v)+'☆'.repeat(5-v);
      return `<span>${STAR_LABELS[k]}<b>${filled} (${v})</b></span>`;
    }).join('');
    const logHtml = p.logs.length
      ? p.logs.map(l=>`<div class="rc-log-item"><span class="t">[${l.t}]</span><span>${escapeHtml(l.text)}</span></div>`).join('')
      : `<div class="rc-log-empty">— メモなし —</div>`;
    card.innerHTML=`
      <div class="rc-head">
        <div class="rc-name">${escapeHtml(p.name)}</div>
        <div class="rc-stars">${starHtml}</div>
      </div>
      <div class="rc-log">${logHtml}</div>
    `;
    body.appendChild(card);
  });
}

document.getElementById('backBtn').addEventListener('click',()=>{
  buzz();
  state.phase='interview';
  go('interview');
  startTimer();
});
document.getElementById('newBtn').addEventListener('click',()=>{
  buzz();
  if(!confirm('新しい面接を開始します。現在の記録は失われます。よろしいですか？'))return;
  state.participants=[];
  state.activeIdx=-1;
  state.phase='setup';
  go('setup');
});

/* ===== Clipboard ===== */
document.getElementById('copyBtn').addEventListener('click',async()=>{
  buzz(30);
  const txt=buildExportText();
  try{
    await navigator.clipboard.writeText(txt);
    showToast('クリップボードにコピーしました ✓');
  }catch(e){
    // fallback
    const ta=document.createElement('textarea');
    ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');showToast('コピーしました ✓');}
    catch(e2){showToast('コピー失敗');}
    document.body.removeChild(ta);
  }
});
function buildExportText(){
  const d=new Date(state.startTs);
  const pad=n=>String(n).padStart(2,'0');
  const dt=`${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  let s=`=== 集団面接 評価記録 ===\n日時: ${dt}\n総時間: ${fmtTime(elapsedSec())}\n受験者数: ${state.participants.length}名\n\n`;
  state.participants.forEach((p,i)=>{
    s+=`--- ${i+1}. ${p.name} ---\n`;
    s+=`[評価] マナー:${'★'.repeat(p.stars.manner)}${'☆'.repeat(5-p.stars.manner)} (${p.stars.manner}/5)  `;
    s+=`話し方:${'★'.repeat(p.stars.voice)}${'☆'.repeat(5-p.stars.voice)} (${p.stars.voice}/5)  `;
    s+=`内容:${'★'.repeat(p.stars.content)}${'☆'.repeat(5-p.stars.content)} (${p.stars.content}/5)\n`;
    s+=`[コメントログ]\n`;
    if(p.logs.length===0)s+=`  (なし)\n`;
    else p.logs.forEach(l=>{s+=`  [${l.t}] ${l.text}\n`;});
    s+='\n';
  });
  return s;
}

/* ===== Navigation ===== */
function go(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(name).classList.add('active');
}

/* ===== Utils ===== */
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function escapeAttr(s){return escapeHtml(s);}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

/* ===== A2HS Banner: show only in regular Safari (not standalone) ===== */
(function(){
  const isStandalone = window.navigator.standalone===true ||
                       window.matchMedia('(display-mode: standalone)').matches ||
                       window.matchMedia('(display-mode: fullscreen)').matches;
  const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
  const dismissed = localStorage.getItem('a2hs_dismissed')==='1';
  if(isIOS && !isStandalone && !dismissed){
    setTimeout(()=>document.getElementById('a2hs').classList.add('show'),600);
  }
  document.getElementById('a2hsClose').addEventListener('click',()=>{
    buzz();
    document.getElementById('a2hs').classList.remove('show');
    try{localStorage.setItem('a2hs_dismissed','1');}catch(e){}
  });
})();

/* ===== Init ===== */
loadLS();
renderNames();
document.querySelectorAll('.count-btn').forEach(b=>{
  b.classList.toggle('on',+b.dataset.n===state.count);
});

</script>
</body>
</html>
